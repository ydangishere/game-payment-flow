<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Xsolla Payment Flow — Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800;900&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #1a1d24; min-height: 100vh; font-family: 'Inter', system-ui, sans-serif; color: #fff; -webkit-font-smoothing: antialiased; }
  body {
    background:
      radial-gradient(1200px 800px at 50% 30%, #2a2f3a 0%, #1a1d24 60%, #0f1116 100%);
  }
  #root { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
  input { font-family: inherit; }

  /* Game-style tokens used by screens */
  :root {
    --game-bg: #0c1e3a;
    --game-bg-2: #102a4c;
    --game-panel: #143768;
    --game-gold: #f3c34a;
    --game-gold-dark: #a8741b;
    --game-gold-deep: #6e4a10;
    --game-frame: #c98a2e;
    --game-frame-dark: #7a4d12;
    --game-text: #ffffff;
    --game-text-dim: #c4d5ec;
    --game-blue-btn: #1f6fb2;
    --game-blue-btn-2: #2a8fdb;
    --game-red: #c8323a;
    --game-green: #5cc14a;
    --game-coin: #ffcf3a;

    --gid-blue: #2a3df0;
    --gid-blue-2: #4252ff;
    --gid-cyan: #1cd6e0;
  }

  /* Loader / common */
  .placeholder-img {
    background-image:
      repeating-linear-gradient(135deg, rgba(255,255,255,0.06) 0 6px, rgba(255,255,255,0.02) 6px 12px);
    background-color: rgba(0,0,0,0.25);
    border: 1px dashed rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.55);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    text-align: center;
    border-radius: 8px;
  }

  /* Slight wrapper for scaling on small screens */
  .stage {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px;
  }
  .stage-meta {
    font-family: 'JetBrains Mono', monospace;
    color: rgba(255,255,255,0.45);
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    display: flex; gap: 14px; align-items: center;
  }
  .stage-meta .dot { width: 6px; height: 6px; border-radius: 50%; background: #6cf08a; box-shadow: 0 0 8px #6cf08a; }

  .reset-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 8px 14px; border-radius: 8px;
    transition: all 0.15s;
  }
  .reset-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes glowPulse {
    0%, 100% { filter: drop-shadow(0 0 14px rgba(82,193,255,0.6)) drop-shadow(0 0 32px rgba(82,193,255,0.35)); }
    50% { filter: drop-shadow(0 0 22px rgba(82,193,255,0.8)) drop-shadow(0 0 48px rgba(82,193,255,0.5)); }
  }
  @keyframes rayRotate {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }
  @keyframes coinReveal {
    0% { opacity: 0; transform: scale(0.4); }
    60% { opacity: 1; transform: scale(1.1); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes spinSlow { to { transform: rotate(360deg); } }
  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="screens/selector.jsx"></script>
<script type="text/babel" src="screens/coinpack.jsx"></script>
<script type="text/babel" src="screens/gearid.jsx"></script>
<script type="text/babel" src="screens/xsolla.jsx"></script>
<script type="text/babel" src="screens/yougot.jsx"></script>
<script type="text/babel" src="screens/linkprompt.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
